name: Shree-Vishweswar-Shiv-Mandir

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Verify Java
        run: java -version

      - name: Build
        run: mvn clean install

      - name: Run Tests
        run: mvn test